name: Deploy static site

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      article_id:
        description: Article id to finalize after a successful deploy.
        required: false
        type: string
      article_slug:
        description: Article slug used only for traceability in the workflow run.
        required: false
        type: string
      article_updated_at:
        description: Article updated_at value expected when finalizing publication.
        required: false
        type: string
      publication_action:
        description: Publication action requested by the CMS.
        required: false
        default: publish
        type: choice
        options:
          - publish
          - unpublish
      actor_id:
        description: CMS user id that requested the publication.
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for requested article state
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.article_id != '' && inputs.article_slug != '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ARTICLE_ID: ${{ inputs.article_id }}
          ARTICLE_SLUG: ${{ inputs.article_slug }}
          ARTICLE_UPDATED_AT: ${{ inputs.article_updated_at }}
          PUBLICATION_ACTION: ${{ inputs.publication_action }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY}" ]; then
            echo "SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY secrets are required."
            exit 1
          fi

          python3 - <<'PY'
          import json
          import os
          import sys
          import time
          import urllib.parse
          import urllib.request

          supabase_url = os.environ["SUPABASE_URL"].rstrip("/")
          service_key = os.environ["SUPABASE_SERVICE_ROLE_KEY"]
          article_id = os.environ["ARTICLE_ID"]
          article_slug = os.environ["ARTICLE_SLUG"]
          article_updated_at = os.environ.get("ARTICLE_UPDATED_AT", "").strip()
          action = os.environ.get("PUBLICATION_ACTION", "publish")

          params = {
              "id": f"eq.{article_id}",
              "select": "id,slug,status,published_at,updated_at",
              "limit": "1",
          }

          url = f"{supabase_url}/rest/v1/articles?{urllib.parse.urlencode(params)}"
          headers = {
              "apikey": service_key,
              "Authorization": f"Bearer {service_key}",
          }

          def is_expected(row):
              if row.get("slug") != article_slug:
                  return False

              status = row.get("status")
              published_at = row.get("published_at")
              updated_at = str(row.get("updated_at") or "")

              if article_updated_at and not updated_at:
                  return False

              if action == "unpublish":
                  return status == 0 and published_at is None

              return status in (0, 1) and isinstance(published_at, str) and len(published_at) > 0

          for attempt in range(1, 13):
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request, timeout=20) as response:
                  rows = json.loads(response.read().decode("utf-8"))

              if rows and is_expected(rows[0]):
                  print(f"Article state is visible in Supabase on attempt {attempt}.")
                  sys.exit(0)

              time.sleep(5)

          print("Requested article state was not visible in Supabase before build.", file=sys.stderr)
          sys.exit(1)
          PY

      - name: Build static site
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PUBLICATION_ARTICLE_ID: ${{ inputs.article_id }}
        run: npm run build

      - name: Validate requested article route
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.article_id != '' && inputs.article_slug != '' }}
        env:
          ARTICLE_SLUG: ${{ inputs.article_slug }}
          PUBLICATION_ACTION: ${{ inputs.publication_action }}
        run: |
          set -euo pipefail

          article_path="dist/kwadv.page/browser/artigo/${ARTICLE_SLUG}/index.html"

          if [ "${PUBLICATION_ACTION}" = "unpublish" ]; then
            if [ -f "${article_path}" ]; then
              echo "Article route still exists after unpublish build: ${article_path}"
              exit 1
            fi

            exit 0
          fi

          if [ ! -f "${article_path}" ]; then
            echo "Article route was not generated: ${article_path}"
            exit 1
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/kwadv.page/browser

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Finalize article publication status
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.article_id != '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ARTICLE_ID: ${{ inputs.article_id }}
          ARTICLE_UPDATED_AT: ${{ inputs.article_updated_at }}
          PUBLICATION_ACTION: ${{ inputs.publication_action }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY}" ]; then
            echo "SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY secrets are required."
            exit 1
          fi

          if [ "${PUBLICATION_ACTION}" = "unpublish" ]; then
            payload='{"status":2,"published_at":null,"published_by":null}'
          else
            payload='{"status":1}'
          fi

          query="$(python3 - <<'PY'
          import os
          import urllib.parse

          params = {
              "id": f"eq.{os.environ['ARTICLE_ID']}",
              "status": "eq.0",
              "select": "id",
          }
          action = os.environ.get("PUBLICATION_ACTION", "publish")
          if action == "unpublish":
              params["published_at"] = "is.null"
          else:
              params["published_at"] = "not.is.null"

          print(urllib.parse.urlencode(params))
          PY
          )"

          response="$(curl --silent --show-error --fail-with-body \
            --request PATCH \
            --url "${SUPABASE_URL}/rest/v1/articles?${query}" \
            --header "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            --header "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            --header "Content-Type: application/json" \
            --header "Prefer: return=representation" \
            --data "${payload}")"

          PATCH_RESPONSE="${response}" python3 - <<'PY'
          import json
          import os
          import sys

          rows = json.loads(os.environ.get("PATCH_RESPONSE", "[]"))
          if not isinstance(rows, list) or len(rows) == 0:
              print("No article row was finalized. It may have been edited after this workflow was queued.", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Finalize pending article statuses after settings build
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.article_id == '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY}" ]; then
            echo "SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY secrets are required."
            exit 1
          fi

          articles_enabled="$(curl --silent --show-error --fail-with-body \
            --url "${SUPABASE_URL}/rest/v1/site_settings?id=eq.1&select=articles_enabled&limit=1" \
            --header "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            --header "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            | python3 -c 'import json,sys; rows=json.load(sys.stdin); print("true" if rows and rows[0].get("articles_enabled") is not False else "false")')"

          if [ "${articles_enabled}" != "true" ]; then
            echo "Articles are disabled; keeping processing article statuses pending."
            exit 0
          fi

          curl --silent --show-error --fail-with-body \
            --request PATCH \
            --url "${SUPABASE_URL}/rest/v1/articles?status=eq.0&published_at=not.is.null" \
            --header "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            --header "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            --header "Content-Type: application/json" \
            --header "Prefer: return=minimal" \
            --data '{"status":1}'

          curl --silent --show-error --fail-with-body \
            --request PATCH \
            --url "${SUPABASE_URL}/rest/v1/articles?status=eq.0&published_at=is.null" \
            --header "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            --header "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            --header "Content-Type: application/json" \
            --header "Prefer: return=minimal" \
            --data '{"status":2,"published_by":null}'
